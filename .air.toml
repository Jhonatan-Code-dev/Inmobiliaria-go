# ================================
# AIR CONFIG - LINUX / WSL
# ================================

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Comando de build
  # - Genera swagger
  # - Compila binario Windows
  cmd = "cmd /c \"swag init -g cmd/api/main.go && go build -o ./tmp/main.exe ./cmd/api\""

  # Binario a ejecutar
  bin = "tmp/main.exe"

  # Delay antes de rebuild
  delay = 1000

  # Directorios a ignorar
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "docs"]

  # Archivos a ignorar
  exclude_file = []

  # Regex a ignorar
  exclude_regex = ["_test.go"]

  # No recompilar si no hay cambios
  exclude_unchanged = false

  # No seguir symlinks
  follow_symlink = false

  # Binario completo (no usado)
  full_bin = ""

  # Directorios incluidos explícitamente
  include_dir = []

  # Extensiones a observar
  include_ext = ["go", "tpl", "tmpl", "html"]

  include_file = []

  # Tiempo para matar proceso viejo
  kill_delay = "0s"

  # Log de errores de build
  log = "build-errors.log"

  # Polling (mejor desactivado en WSL)
  poll = false
  poll_interval = 0

  post_cmd = []
  pre_cmd = []

  # No rerun manual
  rerun = false
  rerun_delay = 500

  # Enviar SIGINT correctamente
  send_interrupt = true

  # Detener si falla el build
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = true

[misc]
  # NO borrar tmp al salir (mejor para debug)
  clean_on_exit = false

[proxy]
  enabled = false
  app_port = 0
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
