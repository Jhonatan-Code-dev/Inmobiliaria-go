info:
  contact: {}
  description: API para autenticacion, administracion de empresas y catalogos de soporte
    para el frontend de Rentals Go.
  title: Rentals Go API
  version: "1.0"
paths:
  /admin/credenciales:
    patch:
      consumes:
      - application/json
      description: Actualiza el usuario y contraseña de un administrador. Si no se
        envía ID en el body, se actualiza el admin autenticado.
      parameters:
      - description: Datos de credenciales
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controller.adminCredencialesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.adminCredencialesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Actualizar credenciales
      tags:
      - admin
  /admin/empresas:
    get:
      description: Retorna las empresas registradas de forma paginada (máx 10 por
        página). Permite buscar por nombre.
      parameters:
      - default: 1
        description: Número de página
        in: query
        name: pagina
        type: integer
      - description: Texto a buscar en el nombre
        in: query
        name: busqueda
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.listadoEmpresasResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Listado de empresas
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Crea una empresa y su usuario principal en una sola operacion.
        Requiere autenticacion de administrador. Solo nombre, pais, usuario y contraseña.
      parameters:
      - description: Datos de empresa y usuario
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controller.crearEmpresaRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/controller.crearEmpresaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Alta de empresa + usuario principal
      tags:
      - admin
  /admin/empresas/{id}:
    delete:
      description: Elimina una empresa por ID.
      parameters:
      - description: ID de empresa
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Eliminar empresa
      tags:
      - admin
    get:
      description: Devuelve el detalle de una empresa.
      parameters:
      - description: ID de empresa
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.empresaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
