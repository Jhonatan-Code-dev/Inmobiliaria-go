basePath: /
definitions:
  internal_controller.actualizarEmpresaRequest:
    properties:
      estado:
        type: string
      moneda:
        type: string
      nombre:
        type: string
      pais:
        type: string
    type: object
  internal_controller.adminCredencialesRequest:
    properties:
      contrasena:
        type: string
      id:
        type: integer
      usuario:
        type: string
    type: object
  internal_controller.adminCredencialesResponse:
    properties:
      id:
        type: integer
      usuario:
        type: string
    type: object
  internal_controller.adminLoginRequest:
    properties:
      contrasena:
        type: string
      usuario:
        type: string
    type: object
  internal_controller.adminLoginResponse:
    properties:
      token:
        type: string
    type: object
  internal_controller.adminProfileResponse:
    properties:
      activo:
        type: boolean
      id:
        type: integer
      usuario:
        type: string
    type: object
  internal_controller.crearEmpresaRequest:
    properties:
      empresa:
        properties:
          moneda:
            type: string
          nombre:
            type: string
          pais:
            type: string
        type: object
      usuario:
        properties:
          password:
            type: string
          usuario:
            type: string
        type: object
    type: object
  internal_controller.crearEmpresaResponse:
    properties:
      empresa_id:
        type: integer
      usuario_id:
        type: integer
    type: object
  internal_controller.empresaResponse:
    properties:
      estado:
        type: string
      id:
        type: integer
      maximo_usuarios:
        type: integer
      moneda:
        type: string
      moneda_info:
        $ref: '#/definitions/internal_controller.monedaResponse'
      nombre:
        type: string
      pais:
        type: string
    type: object
  internal_controller.errorResponse:
    properties:
      message:
        type: string
    type: object
  internal_controller.monedaRegionResponse:
    properties:
      codigo:
        type: string
      nombre:
        type: string
    type: object
  internal_controller.monedaRenderResponse:
    properties:
      currency:
        type: string
      maximum_fraction_digits:
        type: integer
      metodo:
        type: string
      minimum_fraction_digits:
        type: integer
    type: object
  internal_controller.monedaResponse:
    properties:
      codigo:
        type: string
      decimales:
        type: integer
      incremento:
        type: integer
      regiones:
        items:
          $ref: '#/definitions/internal_controller.monedaRegionResponse'
        type: array
      render:
        $ref: '#/definitions/internal_controller.monedaRenderResponse'
    type: object
info:
  contact: {}
  description: API para autenticacion, administracion de empresas y catalogos de soporte
    para el frontend de Rentals Go.
  title: Rentals Go API
  version: "1.0"
paths:
  /admin/credenciales:
    patch:
      consumes:
      - application/json
      description: Actualiza el usuario y contraseña de un administrador. Si no se
        envía ID en el body, se actualiza el admin autenticado.
      parameters:
      - description: Datos de credenciales
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controller.adminCredencialesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_controller.adminCredencialesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Actualizar credenciales
      tags:
      - admin
  /admin/empresas:
    get:
      description: Retorna todas las empresas registradas.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_controller.empresaResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Listado de empresas
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Crea una empresa y su usuario principal en una sola operacion.
        Requiere autenticacion de administrador. Solo nombre, pais, usuario y contraseña.
      parameters:
      - description: Datos de empresa y usuario
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controller.crearEmpresaRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_controller.crearEmpresaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Alta de empresa + usuario principal
      tags:
      - admin
  /admin/empresas/{id}:
    delete:
      description: Elimina una empresa por ID.
      parameters:
      - description: ID de empresa
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Eliminar empresa
      tags:
      - admin
    get:
      description: Devuelve el detalle de una empresa.
      parameters:
      - description: ID de empresa
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_controller.empresaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Obtener empresa por ID
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: Actualiza los datos generales de una empresa.
      parameters:
      - description: ID de empresa
        in: path
        name: id
        required: true
        type: integer
      - description: Datos de empresa
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controller.actualizarEmpresaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_controller.empresaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Actualizar empresa
      tags:
      - admin
  /admin/login:
    post:
      consumes:
      - application/json
      description: Autentica a un administrador y devuelve el JWT que el frontend
        debe enviar en el header Authorization.
      parameters:
      - description: Credenciales
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/internal_controller.adminLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_controller.adminLoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
      summary: Login admin
      tags:
      - admin
  /admin/logout:
    post:
      description: Cierra la sesión del administrador actual eliminando la cookie
        de autenticación.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Logout admin
      tags:
      - admin
  /admin/me:
    get:
      description: Retorna los datos del administrador autenticado a partir del token
        Bearer enviado por el frontend.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_controller.adminProfileResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Perfil del administrador autenticado
      tags:
      - admin
  /catalogos/monedas:
    get:
      description: Lista las monedas ISO 4217 actualmente soportadas por el backend.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_controller.monedaResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
      summary: Catalogo global de monedas
      tags:
      - catalogos
  /catalogos/monedas/{codigo}:
    get:
      description: Retorna precision y simbolos de una moneda ISO 4217.
      parameters:
      - description: Codigo ISO 4217
        in: path
        name: codigo
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_controller.monedaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_controller.errorResponse'
      summary: Detalle de moneda
      tags:
      - catalogos
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 'Token JWT en formato: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
