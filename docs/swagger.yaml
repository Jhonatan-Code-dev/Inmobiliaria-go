basePath: /
definitions:
  controller.actualizarEmpresaRequest:
    properties:
      dias_vencimiento:
        type: integer
      estado:
        type: boolean
      maximo_usuarios:
        type: integer
      nombre:
        type: string
      pais:
        type: string
      vencimiento:
        type: string
    type: object
  controller.adminCredencialesRequest:
    properties:
      contrasena:
        type: string
      id:
        type: integer
      usuario:
        type: string
    type: object
  controller.adminCredencialesResponse:
    properties:
      id:
        type: integer
      usuario:
        type: string
    type: object
  controller.adminLoginRequest:
    properties:
      contrasena:
        type: string
      usuario:
        type: string
    type: object
  controller.adminLoginResponse:
    properties:
      token:
        type: string
    type: object
  controller.adminProfileResponse:
    properties:
      activo:
        type: boolean
      id:
        type: integer
      usuario:
        type: string
    type: object
  controller.crearEmpresaRequest:
    properties:
      empresa:
        properties:
          moneda:
            type: string
          nombre:
            type: string
          pais:
            type: string
          suscripcion_dias:
            type: integer
        type: object
      usuario:
        properties:
          password:
            type: string
          usuario:
            type: string
        type: object
    type: object
  controller.crearEmpresaResponse:
    properties:
      empresa_id:
        type: integer
      usuario_id:
        type: integer
    type: object
  controller.empresaDetalleResponse:
    properties:
      creado_en:
        type: string
      estado:
        type: boolean
      id:
        type: integer
      maximo_usuarios:
        type: integer
      moneda:
        type: string
      nombre:
        type: string
      pais:
        type: string
      vencimiento:
        type: string
    type: object
  controller.empresaListItemResponse:
    properties:
      estado:
        type: boolean
      id:
        type: integer
      nombre:
        type: string
      pais:
        type: string
      vencimiento:
        type: string
    type: object
  controller.empresaResponse:
    properties:
      creado_en:
        type: string
      estado:
        type: boolean
      id:
        type: integer
      maximo_usuarios:
        type: integer
      moneda:
        type: string
      nombre:
        type: string
      pais:
        type: string
      vencimiento:
        type: string
    type: object
  controller.errorResponse:
    properties:
      message:
        type: string
    type: object
  controller.gastoRequest:
    properties:
      descripcion:
        example: Pago de servicios básicos
        type: string
      empresa_id:
        example: 1
        type: integer
      fecha:
        example: "2024-04-07"
        type: string
      monto:
        example: 50
        type: number
      tipo_pago_id:
        example: 3
        type: integer
    type: object
  controller.gastoResponse:
    properties:
      descripcion:
        example: Pago de servicios básicos
        type: string
      empresa_id:
        example: 1
        type: integer
      fecha:
        example: "2024-04-07T00:00:00Z"
        type: string
      id:
        example: 10
        type: integer
      monto:
        example: 50
        type: number
      tipo_pago_id:
        example: 3
        type: integer
    type: object
  controller.listadoEmpresasResponse:
    properties:
      datos:
        items:
          $ref: '#/definitions/controller.empresaListItemResponse'
        type: array
      paginacion:
        $ref: '#/definitions/controller.paginadorResponse'
    type: object
  controller.listadoGastosResponse:
    properties:
      datos:
        items:
          $ref: '#/definitions/controller.gastoResponse'
        type: array
      paginacion:
        $ref: '#/definitions/controller.paginadorResponse'
    type: object
  controller.monedaRegionResponse:
    properties:
      codigo:
        type: string
      nombre:
        type: string
    type: object
  controller.monedaRenderResponse:
    properties:
      currency:
        type: string
      maximum_fraction_digits:
        type: integer
      metodo:
        type: string
      minimum_fraction_digits:
        type: integer
    type: object
  controller.monedaResponse:
    properties:
      codigo:
        type: string
      decimales:
        type: integer
      incremento:
        type: integer
      regiones:
        items:
          $ref: '#/definitions/controller.monedaRegionResponse'
        type: array
      render:
        $ref: '#/definitions/controller.monedaRenderResponse'
    type: object
  controller.paginadorResponse:
    properties:
      pagina:
        type: integer
      paginas:
        type: integer
      por_pagina:
        type: integer
      total:
        type: integer
    type: object
  controller.tipoPagoResponse:
    properties:
      id:
        example: 1
        type: integer
      nombre:
        example: efectivo
        type: string
    type: object
  controller.usuarioLoginRequest:
    properties:
      contrasena:
        type: string
      usuario:
        type: string
    type: object
  controller.usuarioLoginResponse:
    properties:
      empresa:
        $ref: '#/definitions/controller.empresaResponse'
      empresa_id:
        type: integer
      token:
        type: string
      user:
        $ref: '#/definitions/controller.usuarioResponse'
    type: object
  controller.usuarioResponse:
    properties:
      empresa_id:
        type: integer
      id:
        type: integer
      usuario:
        type: string
    type: object
info:
  contact: {}
  description: API para autenticacion, administracion de empresas y catalogos de soporte
    para el frontend de Rentals Go.
  title: Rentals Go API
  version: "1.0"
paths:
  /admin/credenciales:
    patch:
      consumes:
      - application/json
      description: Actualiza el usuario y contraseña de un administrador. Si no se
        envía ID en el body, se actualiza el admin autenticado.
      parameters:
      - description: Datos de credenciales
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controller.adminCredencialesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.adminCredencialesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Actualizar credenciales
      tags:
      - admin
  /admin/empresas:
    get:
      description: Retorna las empresas registradas de forma paginada (máx 10 por
        página). Permite buscar por nombre.
      parameters:
      - default: 1
        description: Número de página
        in: query
        name: pagina
        type: integer
      - description: Texto a buscar en el nombre
        in: query
        name: busqueda
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.listadoEmpresasResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Listado de empresas
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Crea una empresa y su usuario principal en una sola operacion.
        Requiere autenticacion de administrador. Solo nombre, pais, usuario y contraseña.
      parameters:
      - description: Datos de empresa y usuario
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controller.crearEmpresaRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/controller.crearEmpresaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Alta de empresa + usuario principal
      tags:
      - admin
  /admin/empresas/{id}:
    delete:
      description: Elimina una empresa por ID.
      parameters:
      - description: ID de empresa
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Eliminar empresa
      tags:
      - admin
    get:
      description: Devuelve el detalle de una empresa.
      parameters:
      - description: ID de empresa
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.empresaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Obtener empresa por ID
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: Actualiza los datos de una empresa de forma parcial. Solo se actualizarán
        los campos enviados en el body.
      parameters:
      - description: ID de empresa
        in: path
        name: id
        required: true
        type: integer
      - description: Datos de empresa
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controller.actualizarEmpresaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.empresaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Actualizar empresa
      tags:
      - admin
  /admin/empresas/{id}/detalle:
    get:
      description: 'Devuelve todos los datos de una empresa: info general, suscripcion,
        estado y fechas.'
      parameters:
      - description: ID de empresa
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.empresaDetalleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Detalle completo de empresa
      tags:
      - admin
  /admin/login:
    post:
      consumes:
      - application/json
      description: Autentica a un administrador y devuelve el JWT que el frontend
        debe enviar en el header Authorization.
      parameters:
      - description: Credenciales
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/controller.adminLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.adminLoginResponse'
        "400":
          description: Faltan datos o el formato es incorrecto
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Usuario o contraseña incorrecto
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Ha ocurrido un error inesperado, intente más tarde
          schema:
            $ref: '#/definitions/controller.errorResponse'
      summary: Login admin
      tags:
      - admin
  /admin/logout:
    post:
      description: Cierra la sesión del administrador actual eliminando la cookie
        de autenticación.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Logout admin
      tags:
      - admin
  /admin/me:
    get:
      description: Retorna los datos del administrador autenticado a partir del token
        Bearer enviado por el frontend.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.adminProfileResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Perfil del administrador autenticado
      tags:
      - admin
  /api/user/gastos:
    get:
      description: 'Obtiene una lista paginada de gastos (máx 10). Filtros opcionales:
        anio, mes, desde, hasta, fecha.'
      parameters:
      - default: 1
        description: Número de página
        in: query
        name: pag
        type: integer
      - description: Año del gasto
        in: query
        name: anio
        type: integer
      - description: Mes del gasto (1-12)
        in: query
        name: mes
        type: integer
      - description: Fecha inicio (YYYY-MM-DD)
        in: query
        name: desde
        type: string
      - description: Fecha fin (YYYY-MM-DD)
        in: query
        name: hasta
        type: string
      - description: Fecha exacta (YYYY-MM-DD)
        in: query
        name: fecha
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.listadoGastosResponse'
      security:
      - BearerAuth: []
      summary: Listar gastos con filtros y paginación
      tags:
      - Gastos
    post:
      consumes:
      - application/json
      description: Crea un nuevo gasto y un movimiento de egreso en caja automático.
      parameters:
      - description: Datos del gasto
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controller.gastoRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/controller.gastoResponse'
      security:
      - BearerAuth: []
      summary: Registrar un nuevo gasto
      tags:
      - Gastos
  /api/user/gastos/{id}:
    delete:
      description: Elimina el registro de gasto permanentemente.
      parameters:
      - description: ID del gasto
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Eliminar un gasto
      tags:
      - Gastos
    put:
      consumes:
      - application/json
      description: Actualiza los datos de un gasto existente.
      parameters:
      - description: ID del gasto
        in: path
        name: id
        required: true
        type: integer
      - description: Datos a actualizar
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controller.gastoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.gastoResponse'
      security:
      - BearerAuth: []
      summary: Actualizar un gasto
      tags:
      - Gastos
  /api/user/gastos/tipos-pago:
    get:
      description: Obtiene la lista de tipos de pago disponibles (Yape, Plin, Efectivo,
        etc.)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/controller.tipoPagoResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Listar los tipos de métodos de pago
      tags:
      - Gastos
  /auth/login:
    post:
      consumes:
      - application/json
      description: Permite a un usuario autenticarse y obtener un token JWT. Además,
        establece una cookie de sesión.
      parameters:
      - description: Credenciales de usuario
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controller.usuarioLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.usuarioLoginResponse'
        "401":
          description: Credenciales inválidas
          schema:
            $ref: '#/definitions/controller.errorResponse'
      summary: Iniciar sesión como usuario
      tags:
      - Usuarios
  /auth/logout:
    post:
      description: Elimina el token de sesión (cookie) del navegador.
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Cerrar sesión
      tags:
      - Usuarios
  /catalogos/monedas:
    get:
      description: Lista las monedas ISO 4217 actualmente soportadas por el backend.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/controller.monedaResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      summary: Catalogo global de monedas
      tags:
      - catalogos
  /catalogos/monedas/{codigo}:
    get:
      description: Retorna precision y simbolos de una moneda ISO 4217.
      parameters:
      - description: Codigo ISO 4217
        in: path
        name: codigo
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.monedaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      summary: Detalle de moneda
      tags:
      - catalogos
  /me:
    get:
      description: Retorna los datos del usuario autenticado y su empresa.
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.usuarioLoginResponse'
        "401":
          description: No autorizado
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - ApiKeyAuth: []
      summary: Obtener perfil del usuario actual
      tags:
      - Usuarios
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 'Token JWT en formato: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
