basePath: /
definitions:
  controller.actualizarEmpresaRequest:
    properties:
      dias_vencimiento:
        type: integer
      estado:
        type: boolean
      maximo_usuarios:
        type: integer
      nombre:
        type: string
      pais:
        type: string
      vencimiento:
        type: string
    type: object
  controller.adminCredencialesRequest:
    properties:
      contrasena:
        type: string
      id:
        type: integer
      usuario:
        type: string
    type: object
  controller.adminCredencialesResponse:
    properties:
      id:
        type: integer
      usuario:
        type: string
    type: object
  controller.adminLoginRequest:
    properties:
      contrasena:
        type: string
      usuario:
        type: string
    type: object
  controller.adminLoginResponse:
    properties:
      token:
        type: string
    type: object
  controller.adminProfileResponse:
    properties:
      activo:
        type: boolean
      id:
        type: integer
      usuario:
        type: string
    type: object
  controller.alquilerRequest:
    properties:
      cliente_id:
        type: integer
      deposito_garantia:
        example: 1200.5
        type: number
      fecha_fin:
        type: string
      fecha_inicio:
        type: string
      moneda:
        type: string
      monto_renta:
        example: 1200.5
        type: number
      observaciones:
        type: string
      unidad_id:
        type: integer
      vencimiento_dia_pago:
        type: integer
    type: object
  controller.alquilerResponse:
    properties:
      cliente:
        type: string
      cliente_id:
        type: integer
      estado:
        type: string
      fecha_fin:
        type: string
      fecha_inicio:
        type: string
      id:
        type: integer
      moneda:
        type: string
      monto:
        $ref: '#/definitions/money.Amount'
      unidad:
        type: string
      unidad_id:
        type: integer
    type: object
  controller.clienteRequest:
    properties:
      apellidos:
        type: string
      contacto_emergencia:
        type: string
      correo:
        type: string
      direccion:
        type: string
      documento_numero:
        type: string
      empresa_id:
        type: integer
      estado:
        type: string
      fecha_nacimiento:
        description: YYYY-MM-DD
        type: string
      nacionalidad:
        type: string
      nombres:
        type: string
      notas:
        type: string
      telefono_emergencia:
        type: string
      tipo_identificacion_id:
        type: integer
    type: object
  controller.clienteResponse:
    properties:
      apellidos:
        type: string
      contacto_emergencia:
        type: string
      correo:
        type: string
      creado_en:
        type: string
      direccion:
        type: string
      documento_numero:
        type: string
      empresa_id:
        type: integer
      estado:
        type: string
      fecha_nacimiento:
        type: string
      id:
        type: integer
      nacionalidad:
        type: string
      nombres:
        type: string
      notas:
        type: string
      telefono_emergencia:
        type: string
      tipo_identificacion_id:
        type: integer
    type: object
  controller.crearEmpresaRequest:
    properties:
      empresa:
        properties:
          moneda:
            type: string
          nombre:
            type: string
          pais:
            type: string
          suscripcion_dias:
            type: integer
        type: object
      usuario:
        properties:
          password:
            type: string
          usuario:
            type: string
        type: object
    type: object
  controller.crearEmpresaResponse:
    properties:
      empresa_id:
        type: integer
      usuario_id:
        type: integer
    type: object
  controller.empresaDetalleResponse:
    properties:
      creado_en:
        type: string
      estado:
        type: boolean
      id:
        type: integer
      maximo_usuarios:
        type: integer
      moneda:
        type: string
      nombre:
        type: string
      pais:
        type: string
      vencimiento:
        type: string
    type: object
  controller.empresaListItemResponse:
    properties:
      estado:
        type: boolean
      id:
        type: integer
      nombre:
        type: string
      pais:
        type: string
      vencimiento:
        type: string
    type: object
  controller.empresaResponse:
    properties:
      creado_en:
        type: string
      estado:
        type: boolean
      id:
        type: integer
      maximo_usuarios:
        type: integer
      moneda:
        type: string
      nombre:
        type: string
      pais:
        type: string
      vencimiento:
        type: string
    type: object
  controller.errorResponse:
    properties:
      message:
        type: string
    type: object
  controller.gastoRequest:
    properties:
      descripcion:
        example: Pago de servicios básicos
        type: string
      empresa_id:
        example: 1
        type: integer
      fecha:
        example: "2024-04-07"
        type: string
      monto:
        example: 50
        type: number
      tipo_pago_id:
        example: 3
        type: integer
    type: object
  controller.gastoResponse:
    properties:
      descripcion:
        example: Pago de servicios básicos
        type: string
      empresa_id:
        example: 1
        type: integer
      fecha:
        example: "2024-04-07T00:00:00Z"
        type: string
      id:
        example: 10
        type: integer
      monto:
        example: 50
        type: number
      tipo_pago_id:
        example: 3
        type: integer
    type: object
  controller.inmuebleRequest:
    properties:
      ciudad:
        type: string
      codigo_postal:
        type: string
      descripcion:
        type: string
      direccion:
        type: string
      empresa_id:
        type: integer
      estado:
        type: string
      nombre:
        type: string
      pais:
        type: string
      region:
        type: string
      tipo:
        type: string
      total_pisos:
        type: integer
      total_unidades:
        type: integer
    type: object
  controller.inmuebleResponse:
    properties:
      ciudad:
        type: string
      codigo_postal:
        type: string
      creado_en:
        type: string
      descripcion:
        type: string
      direccion:
        type: string
      empresa_id:
        type: integer
      estado:
        type: string
      id:
        type: integer
      nombre:
        type: string
      pais:
        type: string
      region:
        type: string
      tipo:
        type: string
      total_pisos:
        type: integer
      total_unidades:
        type: integer
      unidades:
        items:
          $ref: '#/definitions/controller.unidadResponse'
        type: array
    type: object
  controller.listadoAlquileresResponse:
    properties:
      datos:
        items:
          $ref: '#/definitions/controller.alquilerResponse'
        type: array
      paginacion:
        $ref: '#/definitions/controller.paginadorResponse'
    type: object
  controller.listadoClientesResponse:
    properties:
      datos:
        items:
          $ref: '#/definitions/controller.clienteResponse'
        type: array
      paginacion:
        $ref: '#/definitions/controller.paginadorResponse'
    type: object
  controller.listadoEmpresasResponse:
    properties:
      datos:
        items:
          $ref: '#/definitions/controller.empresaListItemResponse'
        type: array
      paginacion:
        $ref: '#/definitions/controller.paginadorResponse'
    type: object
  controller.listadoGastosResponse:
    properties:
      datos:
        items:
          $ref: '#/definitions/controller.gastoResponse'
        type: array
      paginacion:
        $ref: '#/definitions/controller.paginadorResponse'
    type: object
  controller.listadoInmueblesResponse:
    properties:
      datos:
        items:
          $ref: '#/definitions/controller.inmuebleResponse'
        type: array
      paginacion:
        $ref: '#/definitions/controller.paginadorResponse'
    type: object
  controller.monedaRegionResponse:
    properties:
      codigo:
        type: string
      nombre:
        type: string
    type: object
  controller.monedaRenderResponse:
    properties:
      currency:
        type: string
      maximum_fraction_digits:
        type: integer
      metodo:
        type: string
      minimum_fraction_digits:
        type: integer
    type: object
  controller.monedaResponse:
    properties:
      codigo:
        type: string
      decimales:
        type: integer
      incremento:
        type: integer
      regiones:
        items:
          $ref: '#/definitions/controller.monedaRegionResponse'
        type: array
      render:
        $ref: '#/definitions/controller.monedaRenderResponse'
    type: object
  controller.paginadorResponse:
    properties:
      pagina:
        type: integer
      pagina_actual:
        type: integer
      paginas:
        type: integer
      por_pagina:
        type: integer
      total:
        type: integer
    type: object
  controller.pagoAlquilerResponse:
    properties:
      alquiler_id:
        type: integer
      fecha_pago:
        type: string
      id:
        type: integer
      mes_correspondiente:
        type: integer
      metodo_pago:
        type: string
      moneda:
        type: string
      monto_pagado:
        $ref: '#/definitions/money.Amount'
      nota:
        type: string
      numero_recibo:
        type: string
    type: object
  controller.pendientePagoResponse:
    properties:
      alquiler_id:
        type: integer
      cliente:
        type: string
      estado:
        type: string
      fecha_vencimiento:
        type: string
      monto:
        $ref: '#/definitions/money.Amount'
      unidad:
        type: string
    type: object
  controller.registrarPagoRequest:
    properties:
      alquiler_id:
        type: integer
      fecha_pago:
        type: string
      mes_correspondiente:
        type: integer
      metodo_pago:
        type: string
      monto_pagado:
        example: 1200.5
        type: number
      nota:
        type: string
    type: object
  controller.tipoIdentificacionResponse:
    properties:
      activo:
        type: boolean
      codigo:
        type: string
      id:
        type: integer
      nombre:
        type: string
      pais:
        type: string
    type: object
  controller.tipoPagoResponse:
    properties:
      id:
        example: 1
        type: integer
      nombre:
        example: efectivo
        type: string
    type: object
  controller.unidadRequest:
    properties:
      area_m2:
        type: number
      banos:
        type: integer
      capacidad:
        type: integer
      codigo:
        type: string
      deposito_requerido:
        example: 500
        type: number
      dormitorios:
        type: integer
      estado:
        type: string
      incluye_agua:
        type: boolean
      incluye_internet:
        type: boolean
      incluye_luz:
        type: boolean
      moneda:
        type: string
      nombre:
        type: string
      notas:
        type: string
      numero_piso:
        type: integer
      precio_base:
        example: 850
        type: number
      tipo:
        type: string
    type: object
  controller.unidadResponse:
    properties:
      area_m2:
        type: number
      banos:
        type: integer
      capacidad:
        type: integer
      codigo:
        type: string
      creado_en:
        type: string
      deposito_requerido:
        example: 500
        type: number
      dormitorios:
        type: integer
      estado:
        type: string
      id:
        type: integer
      incluye_agua:
        type: boolean
      incluye_internet:
        type: boolean
      incluye_luz:
        type: boolean
      moneda:
        type: string
      nombre:
        type: string
      notas:
        type: string
      numero_piso:
        type: integer
      precio_base:
        example: 850
        type: number
      propiedad_id:
        type: integer
      tipo:
        type: string
    type: object
  controller.usuarioLoginRequest:
    properties:
      contrasena:
        type: string
      usuario:
        type: string
    type: object
  controller.usuarioLoginResponse:
    properties:
      empresa:
        $ref: '#/definitions/controller.empresaResponse'
      empresa_id:
        type: integer
      token:
        type: string
      user:
        $ref: '#/definitions/controller.usuarioResponse'
    type: object
  controller.usuarioResponse:
    properties:
      empresa_id:
        type: integer
      id:
        type: integer
      usuario:
        type: string
    type: object
  money.Amount:
    type: object
info:
  contact: {}
  description: API para autenticacion, administracion de empresas y catalogos de soporte
    para el frontend de Rentals Go.
  title: Rentals Go API
  version: "1.0"
paths:
  /admin/credenciales:
    patch:
      consumes:
      - application/json
      description: Actualiza el usuario y contraseña de un administrador. Si no se
        envía ID en el body, se actualiza el admin autenticado.
      parameters:
      - description: Datos de credenciales
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controller.adminCredencialesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.adminCredencialesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Actualizar credenciales
      tags:
      - admin
  /admin/empresas:
    get:
      description: Retorna las empresas registradas de forma paginada (máx 10 por
        página). Permite buscar por nombre.
      parameters:
      - default: 1
        description: Número de página
        in: query
        name: pagina
        type: integer
      - description: Texto a buscar en el nombre
        in: query
        name: busqueda
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.listadoEmpresasResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Listado de empresas
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Crea una empresa y su usuario principal en una sola operacion.
        Requiere autenticacion de administrador. Solo nombre, pais, usuario y contraseña.
      parameters:
      - description: Datos de empresa y usuario
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controller.crearEmpresaRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/controller.crearEmpresaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Alta de empresa + usuario principal
      tags:
      - admin
  /admin/empresas/{id}:
    delete:
      description: Elimina una empresa por ID.
      parameters:
      - description: ID de empresa
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Eliminar empresa
      tags:
      - admin
    get:
      description: Devuelve el detalle de una empresa.
      parameters:
      - description: ID de empresa
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.empresaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Obtener empresa por ID
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: Actualiza los datos de una empresa de forma parcial. Solo se actualizarán
        los campos enviados en el body.
      parameters:
      - description: ID de empresa
        in: path
        name: id
        required: true
        type: integer
      - description: Datos de empresa
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controller.actualizarEmpresaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.empresaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Actualizar empresa
      tags:
      - admin
  /admin/empresas/{id}/detalle:
    get:
      description: 'Devuelve todos los datos de una empresa: info general, suscripcion,
        estado y fechas.'
      parameters:
      - description: ID de empresa
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.empresaDetalleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Detalle completo de empresa
      tags:
      - admin
  /admin/login:
    post:
      consumes:
      - application/json
      description: Autentica a un administrador y devuelve el JWT que el frontend
        debe enviar en el header Authorization.
      parameters:
      - description: Credenciales
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/controller.adminLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.adminLoginResponse'
        "400":
          description: Faltan datos o el formato es incorrecto
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "401":
          description: Usuario o contraseña incorrecto
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Ha ocurrido un error inesperado, intente más tarde
          schema:
            $ref: '#/definitions/controller.errorResponse'
      summary: Login admin
      tags:
      - admin
  /admin/logout:
    post:
      description: Cierra la sesión del administrador actual eliminando la cookie
        de autenticación.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Logout admin
      tags:
      - admin
  /admin/me:
    get:
      description: Retorna los datos del administrador autenticado a partir del token
        Bearer enviado por el frontend.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.adminProfileResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Perfil del administrador autenticado
      tags:
      - admin
  /api/user/alquileres:
    get:
      description: Lista contratos de alquiler con filtros y paginación.
      parameters:
      - description: ID de la empresa
        in: query
        name: empresa_id
        required: true
        type: integer
      - description: Buscar por cliente o código de unidad
        in: query
        name: buscar
        type: string
      - description: Estado del contrato
        in: query
        name: estado
        type: string
      - description: ID de la unidad
        in: query
        name: unidad_id
        type: integer
      - description: Página
        in: query
        name: pag
        type: integer
      - description: Tamaño de página
        in: query
        name: por_pagina
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.listadoAlquileresResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Listar alquileres
      tags:
      - Alquileres
    post:
      consumes:
      - application/json
      description: Crea un nuevo contrato y ocupa la unidad.
      parameters:
      - description: Datos del contrato
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controller.alquilerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/controller.alquilerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Registrar un alquiler
      tags:
      - Alquileres
  /api/user/alquileres/{id}:
    get:
      description: Devuelve el detalle de un contrato de alquiler.
      parameters:
      - description: ID del alquiler
        in: path
        name: id
        required: true
        type: integer
      - description: ID de la empresa
        in: query
        name: empresa_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.alquilerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/controller.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/controller.errorResponse'
      security:
      - BearerAuth: []
      summary: Obtener alquiler por ID
      tags:
      - Alquileres
  /api/user/clientes:
    get:
