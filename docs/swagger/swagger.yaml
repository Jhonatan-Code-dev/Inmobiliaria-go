      parameters:
      - description: 'Página (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Límite (default: 5, max: 5)'
        in: query
        name: limit
        type: integer
      - description: Fecha inicio (YYYY-MM-DD)
        in: query
        name: from_date
        type: string
      - description: Fecha fin (YYYY-MM-DD)
        in: query
        name: to_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 'error: no autorizado'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 'error: fallo interno'
          schema:
            additionalProperties:
              type: string
            type: object
