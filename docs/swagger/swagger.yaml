      - Usuario - Gastos
    post:
      consumes:
      - application/json
      description: Registra un gasto y lo descuenta automáticamente del saldo de la
        caja de la ruta. Permite saldo negativo.
      parameters:
      - description: Datos del gasto
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/gastocontroller.RegistrarGastoRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/gastocontroller.GastoResponse'
        "400":
          description: 'error: datos inválidos'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'error: no autorizado'
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 'error: acceso denegado'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Registrar un gasto
      tags:
      - Usuario - Gastos
  /user/gastos/{id}:
    delete:
      description: Elimina un gasto por su ID, revirtiendo el saldo en la caja y limpiando
