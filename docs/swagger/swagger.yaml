info:
  contact: {}
paths:
  /admin/dashboard/stats:
    get:
      description: Retorna los totales de empresas, usuarios y rutas registradas en
        el sistema.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/empresacontroller.DashboardStatsDTO'
        "500":
          description: 'error: fallo interno al obtener estadísticas'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Obtener estadísticas globales del sistema
      tags:
      - Administración - Dashboard
  /admin/empresas:
    put:
      consumes:
      - application/json
      description: Actualiza el nombre y/o la fecha de corte de una empresa específica
        usando su ID.
      parameters:
      - description: Datos de la actualización
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/empresacontroller.ActualizarEmpresaRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: 'message: empresa actualizada exitosamente'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: 'error: datos inválidos'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 'error: no se pudo actualizar la empresa'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Actualizar datos de una empresa
      tags:
      - Administración - Empresas
  /admin/empresas-detalles:
    get:
      consumes:
      - application/json
      description: Retorna un listado paginado de empresas, incluyendo sus usuarios
        asociados y sus respectivos roles.
      parameters:
      - description: 'Número de página (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Cantidad por página (default: 10)'
        in: query
        name: limit
        type: integer
      - description: 'Criterio de orden (recientes, vencimiento) (default: recientes)'
        in: query
        name: sort_by
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/empresacontroller.PaginatedEmpresasResponseDTO'
        "500":
          description: 'error: no se pudo obtener la lista detallada'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Obtener lista detallada de empresas con usuarios y roles
      tags:
      - Administración - Empresas
  /admin/empresas-paginadas:
    get:
      consumes:
      - application/json
      description: Retorna un listado filtrado y paginado de todas las empresas registradas
        en el sistema.
      parameters:
      - description: 'Número de página (default: 1)'
        in: query
        name: page
        type: integer
