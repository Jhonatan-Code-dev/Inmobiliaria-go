            $ref: '#/definitions/domain.ErrorResponse'
        "401":
          description: no autorizado
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
        "403":
          description: acceso denegado
          schema:
            $ref: '#/definitions/domain.ErrorResponse'
